<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tồn Kho - Tính Tồn Cuối Kỳ (Đơn vị: Thùng)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-overview.css">
    <link rel="stylesheet" href="style-detail.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Quản Lý Tồn Kho</h1>
            <p>Tính tồn cuối kỳ = Tồn đầu + Nhập kho + Chuyển kho - Xuất kho 
                <span class="unit-badge">Đơn vị: Thùng</span>
            </p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Từ ngày</label>
                <input type="date" id="tu_ngay" value="2026-03-01">
            </div>
            <div class="control-group">
                <label>Đến ngày</label>
                <input type="date" id="den_ngay" value="2026-03-10">
            </div>
            <button id="fetchBtn">📊 Tính Tồn Kho</button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div class="progress">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="btnOverview">📈 Tổng quan</button>
            <button class="tab-btn" id="btnDetail">📋 Chi tiết</button>
        </div>

        <!-- Tab Tổng quan -->
        <div id="tabOverview" class="tab-content active">
            <div id="statsOverview" class="stats"></div>
            <div id="chartContainer"></div>
            <div id="categoryChartContainer"></div>
        </div>

        <!-- Tab Chi tiết -->
        <div id="tabDetail" class="tab-content">
            <div id="statsDetail" class="stats"></div>
            <div id="resultsDetail"></div>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script src="data.js"></script>
    <script src="overview.js"></script>
    <script src="detail.js"></script>
    <script src="script.js"></script>
</body>
</html>
