<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo tồn kho cuối kỳ</title>
    <!-- Tailwind CSS & Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

<div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between">
        <div>
            <h1 class="text-3xl font-bold text-indigo-900 flex items-center gap-2">
                <i class="fas fa-boxes text-indigo-600"></i> 
                Báo cáo tồn kho cuối kỳ
            </h1>
            <p class="text-slate-500 text-base mt-1 flex items-center gap-2" id="periodDisplay">
                <i class="far fa-calendar-alt"></i> 
                <span>Đang tải...</span>
            </p>
        </div>
        <div class="mt-3 md:mt-0 flex gap-2">
            <button id="refreshBtn" class="bg-white hover:bg-slate-100 border border-slate-200 rounded-xl px-4 py-2 text-sm flex items-center gap-2">
                <i class="fas fa-sync-alt text-slate-400"></i> Làm mới
            </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-xl flex items-center gap-4">
            <div class="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
            <span class="text-lg font-medium text-slate-700">Đang tải dữ liệu...</span>
        </div>
    </div>

    <!-- Thống kê tồn kho -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="summaryCards">
        <!-- JS sẽ render -->
    </div>

    <!-- Biểu đồ tồn kho theo kho -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
            <h2 class="text-lg font-semibold flex items-center gap-2 mb-3">
                <i class="fas fa-chart-pie text-indigo-500"></i> Tỷ lệ tồn kho theo NPP
            </h2>
            <div class="h-80 flex items-center justify-center">
                <canvas id="inventoryPieChart"></canvas>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
            <h2 class="text-lg font-semibold flex items-center gap-2 mb-3">
                <i class="fas fa-chart-bar text-emerald-500"></i> Top 10 sản phẩm tồn nhiều nhất
            </h2>
            <div class="h-80 overflow-y-auto pr-2" id="topProductsList"></div>
        </div>
    </div>

    <!-- Chi tiết tồn kho theo kho -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6">
        <h2 class="text-lg font-semibold flex items-center gap-2 mb-4">
            <i class="fas fa-store-alt text-amber-500"></i> Chi tiết tồn kho theo từng NPP
        </h2>
        <div class="space-y-6" id="inventoryDetail"></div>
    </div>
</div>

<!-- Scripts -->
<script src="config.js"></script>
<script src="api.js"></script>
<script src="charts.js"></script>
<script src="main.js"></script>
</body>
</html>
