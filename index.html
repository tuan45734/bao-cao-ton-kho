<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tồn Kho - Tính Tồn Cuối Kỳ (Đơn vị: Thùng)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-overview.css">
    <link rel="stylesheet" href="style-detail.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Quản Lý Tồn Kho</h1>
            <p>Tính tồn cuối kỳ = Tồn đầu + Nhập kho + Chuyển kho - Xuất kho 
                <span class="unit-badge">Đơn vị: Thùng</span>
            </p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Từ ngày</label>
                <input type="date" id="tu_ngay" disabled value="2026-04-01">
            </div>
            <div class="control-group">
                <label>Đến ngày</label>
                <input type="date" id="den_ngay" value="2026-04-10">
            </div>
            <button id="fetchBtn">📊 Tính Tồn Kho</button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div class="progress">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btnOverview">📈 Tổng quan</button>
            <button class="tab-btn" id="btnDetail">📋 Chi tiết</button>
        </div>

        <div id="tabOverview" class="tab-content active">
            <div id="statsOverview" class="stats"></div>
            <div id="chartContainer"></div>
            <div id="categoryChartContainer"></div>
            <div id="topNPPChartContainer"></div>
            <div id="bottomNPPChartContainer"></div>
            <div id="topImportCardsContainer" class="top-import-cards-container"></div>
        </div>

        <div id="tabDetail" class="tab-content">
            <div class="detail-filters">
                <div class="filter-group">
                    <label>Chọn khu vực:</label>
                    <select id="regionSelect">
                        <option value="">-- Tất cả khu vực --</option>
                        <option value="KV1">KV1</option>
                        <option value="KV2">KV2</option>
                        <option value="KV3">KV3</option>
                        <option value="KV4">KV4</option>
                        <option value="KV5">KV5</option>
                        <option value="KV6">KV6</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Chọn NPP:</label>
                    <select id="nppSelect" disabled>
                        <option value="">-- Chọn khu vực trước --</option>
                    </select>
                </div>
            </div>
            <div id="detailChartContainer" class="detail-chart-container"></div>
            <div id="detailCategoryContainer" class="detail-category-container"></div>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script src="data.js"></script>
    <script src="overview.js"></script>
    <script src="detail.js"></script>
    <script src="script.js"></script>
</body>
</html>
